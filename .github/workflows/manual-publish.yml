name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from (branch, tag, or SHA)
        required: false
        default: main
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          yarn install --frozen-lockfile
          yarn lerna link

      - name: Build all packages
        run: yarn build

      - name: Publish without bumping versions
        run: yarn lerna publish from-package --summary-file=${{ runner.temp }}/lerna-publish-summary.json --yes --no-private
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
